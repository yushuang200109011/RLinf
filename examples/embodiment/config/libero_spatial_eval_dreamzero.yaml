# libero_spatial_eval_dreamzero.yaml
# DreamZero eval on Libero Spatial (embodied)
# DROID action space: 8D (7 joint + gripper), model outputs action chunks

defaults:
  - env/libero_spatial@env.train
  - env/libero_spatial@env.eval
  - model/dreamzero@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "libero_spatial_eval_dreamzero"
    logger_backends: ["tensorboard"]

  max_epochs: 1
  only_eval: True
  val_check_interval: -1
  save_interval: -1
  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 4
  rollout_epoch: 1
  eval_rollout_epoch: 1

  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: chunk_level

  update_epoch: 5
  adv_type: grpo
  loss_type: actor_critic

  gamma: 0.99
  gae_lambda: 0.95
  bootstrap_type: always
  kl_beta: 0.0
  entropy_bonus: 0.005
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0

env:
  group_name: "EnvGroup"

  train:
    total_num_envs: 8
    max_episode_steps: 480
    max_steps_per_rollout_epoch: 480

  eval:
    total_num_envs: 8
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 480
    max_steps_per_rollout_epoch: 480
    group_size: 1
    is_eval: True

    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1

  model:
    model_path: ${actor.model.model_path}
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 1
  global_batch_size: 64
  seed: 0
  enable_offload: False

  model:
    model_type: "dreamzero"
    model_path: path/to/your/model

    action_dim: 7
    num_action_chunks: 16
    embodiment_tag: "libero_sim"

    is_lora: False

    tokenizer_path: path/to/your/tokenizer
    max_seq_len: 512
    add_value_head: True
    precision: bf16

  fsdp_config:
    strategy: "fsdp"
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False