defaults:
  - env/maniskill_pick_cube@env.train
  - env/maniskill_pick_cube@env.eval
  - model/mlp_policy@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    env,rollout,actor: 0

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "maniskill_dagger_mlp"
    logger_backends: ["tensorboard"] # wandb, swanlab

  max_epochs: 200
  max_steps: -1

  only_eval: False
  val_check_interval: 10
  save_interval: -1

  resume_dir: null # Optional: path to a saved checkpoint directory, such as 'checkpoints/global_step_10'. If not None, it will be used to resume training.
  ckpt_path: null  # Optional: path to a .pt checkpoint. If not None, it will be loaded after the model is instantiated (for evaluation).
  expert_ckpt_path: /home/dataset-assist-0/hongzhi/dagger-0306/RLinf/logs/20260306-09:45:35-maniskill_ppo_mlp/maniskill_ppo_mlp/checkpoints/global_step_100/actor/model_state_dict/full_weights.pt  # Optional: path to a .pt checkpoint. If not None, it will be loaded after the model is instantiated (for evaluation).

algorithm:
  dagger:
    only_save_expert: false
    init_beta: 1
    beta_schedule: "exponential"
    beta_decay: 0.98

  rollout_epoch: 1
  eval_rollout_epoch: 1
  gamma: 0.0

  update_epoch: 8
  adv_type: gae
  loss_type: embodied_dagger

  # params for rollout
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 0
    top_p: 1.0
    repetition_penalty: 1.0

  # length argument for autoregressive sampling
  # max length means max amount of tokens to generate
  length_params:
    max_new_token: 7
    max_length: 1024
    min_length: 1
  
  replay_buffer:
    enable_cache: True
    cache_size: 20000 # number of trajectories cached in memory
    min_buffer_size: 8  # Minimum buffer size before training starts (in number of trajectories). If set too large, it will take a long time to start real-world training 
    sample_window_size: 20000 # number of latest trajectories to sample from for replay buffer
    auto_save: False

env:
  group_name: "EnvGroup"

  # Override the default values in env/maniskill_pick_cube
  train:
    total_num_envs: 1024
    auto_reset: True
    ignore_terminations: False
    use_fixed_reset_state_ids: False
    max_episode_steps: 50 # max episode steps for truncation
    max_steps_per_rollout_epoch: 50
  eval:
    total_num_envs: 32
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 50
    max_steps_per_rollout_epoch: 50
    use_fixed_reset_state_ids: True
    group_size: 1
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1
  collect_prev_infos: False

  model:
    model_path: ""
    precision: ${actor.model.precision}
  
  expert_model:
    model_path: "/home/dataset-assist-0/hongzhi/dagger-0306/RLinf/logs/20260306-09:45:35-maniskill_ppo_mlp/maniskill_ppo_mlp/checkpoints/global_step_50/actor"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 6400
  global_batch_size: 6400
  seed: 42
  enable_offload: False

  # Override the default values in model/mlp_policy
  model:
    model_path: ""
    model_type: "mlp_policy"
    # add_value_head: False

  optim:
    lr: 3.0e-4
    value_lr: 3.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 0.5

  # Override the default values in training_backend/fsdp
  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False