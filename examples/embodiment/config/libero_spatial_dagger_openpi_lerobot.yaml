defaults:
  - env/libero_spatial@env.train
  - env/libero_spatial@env.eval
  - model/pi0@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - weight_syncer/bucket_syncer@weight_syncer
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor: 0-3
    env: 4-7
    rollout: 4-7

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "libero_spatial_dagger_openpi"
    logger_backends: ["tensorboard"]

  max_epochs: 2000
  max_steps: -1

  only_eval: False
  val_check_interval: 8
  save_interval: -1

  resume_dir: null
  ckpt_path: null
  expert_ckpt_path: /path/to/expert_pt

algorithm:
  # dagger specific args
  dagger:
    # beta scheduling args. Expert acts with the probability of beta, while student acts with 1 - beta
    init_beta: 1.0
    beta_schedule: "exponential" # beta_t = beta_{t-1} * beta_decay
    beta_decay: 0.999
    # only_save_expert controls dagger logic. 
    # If set False, all data will be re-labeled by expert and saved (classic-dagger)
    # If set True, only expert data will be saved (hg-dagger, always used in real-world exp)
    only_save_expert: True

  rollout_epoch: 1
  eval_rollout_epoch: 1
  gamma: 0.99

  update_epoch: 1
  adv_type: gae
  loss_type: embodied_dagger

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  length_params:
    max_new_token: 7
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"

  train:
    auto_reset: True
    ignore_terminations: False
    total_num_envs: 32
    max_episode_steps: 240
    max_steps_per_rollout_epoch: 240

    data_collection:
      enabled: True
      save_dir: ${runner.logger.log_path}/physical-intelligence/libero
      export_format: "lerobot"      # or "pickle"
      only_success: True
      robot_type: "panda"
      fps: 10
      finalize_interval: 8
      defer_write: true
  eval:
    total_num_envs: 32
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 240
    max_steps_per_rollout_epoch: 240
    group_size: 1
    is_eval: True
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: libero_10
  enable_offload: False
  pipeline_stage_num: 1
  collect_prev_infos: False

  model:
    model_path: "/path/to/model"
    precision: ${actor.model.precision}

  expert_model: # define expert model_path here
    model_path: "/path/to/expert_model"
    precision: ${actor.model.precision}

actor:
  rolling_lerobot_window_size: 50000
  lerobot_num_workers: 0          # required for in-memory LeRobot DAgger
  min_frames: 6400

  sft_data_path: ${runner.logger.log_path}/physical-intelligence/libero
  data_source: "lerobot"
  lerobot:
    robot_type: "panda"
    fps: 10
    finalize_interval: 8
    in_memory_mode: true
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 32
  global_batch_size: 256
  seed: 1234
  enable_offload: False

  model:
    precision: null
    model_path: "/path/to/model"
    num_action_chunks: 10
    add_value_head: False
    openpi:
      config_name: "pi0_libero_horizon10"
      train_expert_only: False
      detach_critic_input: True
      action_chunk: ${actor.model.num_action_chunks}

  optim:
    lr: 1e-5
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 1e-10
    clip_grad: 5.0
    warmup_style: "cosine"
    lr_warmup_steps: 20
    total_training_steps: 8000

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
