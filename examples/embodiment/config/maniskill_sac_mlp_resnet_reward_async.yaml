defaults:
  - env/maniskill_pick_cube@env.train
  - env/maniskill_pick_cube@env.eval
  - model/mlp_policy@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor: 0-0
    env: 0-0
    rollout: 0-0
    reward: 0-0

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "sac_mlp"
    logger_backends: ["tensorboard"] # wandb, swanlab

  max_epochs: 1000
  max_steps: -1

  only_eval: False
  val_check_interval: 200
  save_interval: -1

  resume_dir: null # Optional: path to a saved checkpoint directory, such as 'checkpoints/global_step_10'. If not None, it will be used to resume training.
  ckpt_path: null  # Optional: path to a .pt checkpoint. If not None, it will be loaded after the model is instantiated (for evaluation).

algorithm:
  update_epoch: 32
  group_size: 1
  agg_q: min

  rollout_epoch: 1
  eval_rollout_epoch: 1

  adv_type: embodied_sac
  loss_type: embodied_sac
  loss_agg_func: "token-mean"
  
  bootstrap_type: always
  gamma: 0.8
  tau: 0.01  # Soft update coefficient for target networks
  
  entropy_tuning:
    alpha_type: softplus # choose from ["softplus", "exp", "fixed_alpha"], set to "softplus" or "exp" to enable automatic entropy tuning
    initial_alpha: 0.01  # Initial temperature value
    target_entropy: -4  # Target entropy (-action_dim)
    optim:
      lr: 3.0e-4  # Learning rate for temperature parameter
      lr_scheduler: torch_constant
      clip_grad: 10.0
  
  # Replay buffer settings
  replay_buffer:
    enable_cache: True
    cache_size: 10000 # number of trajectories cached in memory
    sample_window_size: 10000 # number of latest trajectories to sample from for replay buffer
    min_buffer_size: 1  # Minimum buffer size before training starts
    auto_save: False

  target_update_freq: 1  # Frequency of target network updates

  # params for rollout
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0

  # length argument for autoregressive sampling
  length_params:
    max_new_token: 7
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"

  train:
    total_num_envs: 128
    wrap_obs_mode: simple
    auto_reset: True
    ignore_terminations: False
    use_fixed_reset_state_ids: False
    max_episode_steps: 50 # max episode steps for truncation
    max_steps_per_rollout_epoch: 50
    use_full_state: True
    # RGB mode: obs contains both main_images (for reward) and states (for policy)
    init_params:
      id: "PickCube-v1"
      obs_mode: "rgb"  # RGB mode provides main_images + states
      control_mode: "pd_joint_delta_pos"
      sim_backend: "gpu"
      sim_config:
        sim_freq: 100
        control_freq: 20
      sensor_configs:
        shader_pack: "default"
        width: 224
        height: 224
      render_mode: all
  
  eval:
    total_num_envs: 32
    wrap_obs_mode: simple
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 50
    max_steps_per_rollout_epoch: 50
    use_fixed_reset_state_ids: True
    group_size: 1
    use_full_state: True
    # RGB mode: obs contains both main_images (for reward) and states (for policy)
    init_params:
      id: "PickCube-v1"
      obs_mode: "rgb"  # RGB mode provides main_images + states
      control_mode: "pd_joint_delta_pos"
      sim_backend: "gpu"
      sim_config:
        sim_freq: 100
        control_freq: 20
      sensor_configs:
        shader_pack: "default"
        width: 224
        height: 224
      render_mode: all
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1

  collect_transitions: True
  collect_prev_infos: False

  model:
    model_path: ""
    precision: ${actor.model.precision}

  enable_torch_compile: True
  enable_cuda_graph: False
actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"

  micro_batch_size: 1024
  global_batch_size: 1024
  seed: 1234
  enable_offload: False

  model:
    model_name: "mlp_policy"
    policy_setup: "panda-ee-dpos"
    action_dim: 4
    
    precision: "32"
    add_value_head: False
    add_q_head: True


  optim:
    clip_grad: 10.0
    lr: 3e-4
    lr_scheduler: torch_constant

  critic_optim:
    clip_grad: 10.0
    lr: 3e-4
    lr_scheduler: torch_constant

  # Override the default values in training_backend/fsdp
  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: True
  group_name: "RewardGroup"
  
  # Reward mode:
  # - "per_step": Compute reward for every frame (default, prone to reward hacking)
  # - "terminal": Only compute reward at episode end (last frame), prevents reward hacking
  reward_mode: "terminal"

  reward_threshold: 0.5 # Probability threshold for success/fail classification
  
  # How to combine learned rewards with environment rewards:
  # Weighted sum (reward = env_reward_weight * env_reward + reward_weight * reward_model_reward)
  reward_weight: 1.0
  env_reward_weight: 0.0
  
  model:
    model_path: null
    model_type: "resnet"
    pretrained: False # if pretrained is set to True, rlinf will automatically download pretrained weights.
    arch: "resnet18"
    hidden_dim: 256
    dropout: 0
    image_size: [3, 224, 224]
    normalize: true
    precision: "fp32"

critic:
  use_critic_model: False
