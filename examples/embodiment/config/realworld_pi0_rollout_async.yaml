defaults:
  - env/realworld_bin_relocation@env.train
  - env/realworld_bin_relocation@env.eval
  - model/pi0@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 2
  component_placement:
    actor: 
      node_group: "4090"
      placement: 0 # Local GPU rank in the 4090 node group (n for the n+1 th GPU)
    env:
      node_group: franka
      placement: 0 # Local robot rank in the franka node group (n for the n+1 th robot)
    rollout:
      node_group: "4090"
      placement: 0 # Local GPU rank in the 4090 node group (n for the n+1 th GPU)
  node_groups:
    - label: "4090" # GPU node group
      node_ranks: 0 # The ranks of the nodes to be included in this group， change this if your training node is not rank 0
    - label: franka
      node_ranks: 1 # Change this if your robot node is not rank 1
      hardware:
        type: Franka
        configs:
          - robot_ip: ROBOT_IP # Replace with your robot's IP address
            node_rank: 1

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "sac_mlp"
    logger_backends: ["tensorboard"] # wandb, swanlab

  max_epochs: 8000
  max_steps: -1

  only_eval: False
  val_check_interval: -1
  save_interval: -1

  resume_dir: null # Optional: path to a saved checkpoint directory, such as 'checkpoints/global_step_10'. If not None, it will be used to resume training.
  ckpt_path: "/path/to/full_weights.pt"  # Optional: path to a .pt checkpoint. If not None, it will be loaded after the model is instantiated (for evaluation).

algorithm:
  update_epoch: 32
  group_size: 1
  agg_q: min # or mean
  actor_agg_q: mean
  enable_drq: True

  backup_entropy: False
  critic_subsample_size: 2
  eval_rollout_epoch: 1

  adv_type: embodied_sac
  loss_type: embodied_sac
  loss_agg_func: "token-mean"
  
  bootstrap_type: standard
  gamma: 0.96
  tau: 0.01  # Soft update coefficient for target networks

  entropy_tuning:
    alpha_type: softplus # choose from ["softplus", "exp", "fixed_alpha"], set to "softplus" or "exp" to enable automatic entropy tuning
    initial_alpha: 0.01  # Initial temperature value
    target_entropy: -3  # Target entropy (-action_dim)
    optim:
      lr: 5.0e-4  # Learning rate for temperature parameter
      lr_scheduler: torch_constant
      clip_grad: 10.0
  
  critic_actor_ratio: 2
  # Replay buffer settings
  replay_buffer:
    enable_cache: True
    cache_size: 200 # number of trajectories cached in memory, set big to avoid actor training
    min_buffer_size: 200  # Minimum buffer size before training starts (in number of trajectories). If set too large, it will take a long time to start real-world training 
    sample_window_size: 200 # number of latest trajectories to sample from for replay buffer
    auto_save: False

  # demo_buffer:
  #   enable_cache: True
  #   cache_size: 200 # number of trajectories cached in memory
  #   min_buffer_size: 1
  #   sample_window_size: 200 # number of latest trajectories to sample from for demo buffer
  #   load_path: "/path/to/demo_data"
  #   auto_save: False

  target_update_freq: 1  # Frequency of target network updates

  # params for rollout
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0

  # length argument for autoregressive sampling
  length_params:
    max_new_token: 7
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  enable_offload: False

  train:
    ignore_terminations: False
    no_gripper: False
    total_num_envs: 1
    keyboard_reward_wrapper: single_stage
    use_spacemouse: False

    max_steps_per_rollout_epoch: 160
    max_episode_steps: 160

    override_cfg:
      target_ee_pose: TARGET_EE_POSE # Replace with your target end-effector pose
      camera_serials: ["CAMERA_SERIAL1", "CAMERA_SERIAL2"]
      use_dense_reward: False
      is_dummy: false
      max_num_steps: 160
      enable_gripper_penalty: False

  eval:
    total_num_envs: 1

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  recompute_logprobs: False  # only use when PPO
  enable_offload: False
  pipeline_stage_num: 1
  collect_transitions: True
  collect_prev_infos: False
  
  sync_weight_nccl_max_ctas: 32 # Max CTAs (Compute Thread Array, the compute resource of GPUs) for sync weight communication. Higher values consume more GPU resources, and thus sync weight is faster but could affect rollout speed in async mode. Positive integer 1 to 32. Default 32.

  model:
    model_path: "/path/to/model"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"

  micro_batch_size: 64
  global_batch_size: 256
  seed: 1234
  enable_offload: True

  model:
    model_path: "/path/to/model"
    num_action_chunks: 4
    state_dim: 19
    action_dim: 7
    image_num: 2
    add_value_head: True
    add_q_head: True
    q_head_type: "default"
    
    openpi:
      config_name: "pi0_realworld_pnp"
      train_expert_only: False
      detach_critic_input: True
      action_chunk: ${actor.model.num_action_chunks}


  optim:
    lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.96
    adam_eps: 1.0e-08
    clip_grad: 3.5
    

  critic_optim:
    lr: 3.0e-4
    clip_grad: 10.0
    lr_scheduler: torch_constant

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    use_orig_params: True
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
