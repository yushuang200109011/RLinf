defaults:
  - env/maniskill_pick_cube@env.train
  - env/maniskill_pick_cube@env.eval
  - model/mlp_policy@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - weight_syncer/bucket_syncer@weight_syncer
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor: 0
    env: 0
    rollout: 0

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "maniskill_dagger_mlp_lerobot"
    logger_backends: ["tensorboard"]

  max_epochs: 2000
  max_steps: -1

  only_eval: False
  val_check_interval: 8
  save_interval: -1

  resume_dir: null
  ckpt_path: null
  expert_ckpt_path: /home/zanghongzhi/rlinf_ws/0331/RLinf/logs/20260407-21:11:14-maniskill_ppo_mlp/maniskill_ppo_mlp/checkpoints/global_step_150/actor/model_state_dict/full_weights.pt

algorithm:
  # dagger specific args
  dagger:
    # beta scheduling args. Expert acts with the probability of beta, while student acts with 1 - beta
    init_beta: 1.0
    beta_schedule: "exponential" # beta_t = beta_{t-1} * beta_decay
    beta_decay: 0.98
    beta_min: 0.05
    # only_save_expert controls dagger logic. 
    # If set False, all data will be re-labeled by expert and saved (classic-dagger)
    # If set True, only expert data will be saved (hg-dagger, always used in real-world exp)
    only_save_expert: true

  rollout_epoch: 1
  eval_rollout_epoch: 1
  gamma: 0.0

  update_epoch: 8
  adv_type: gae
  loss_type: embodied_dagger

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 0
    top_p: 1.0
    repetition_penalty: 1.0

  length_params:
    max_new_token: 7
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"

  train:
    total_num_envs: 8
    auto_reset: True
    ignore_terminations: False
    use_fixed_reset_state_ids: False
    max_episode_steps: 50
    max_steps_per_rollout_epoch: 50

    data_collection:
      enabled: True
      save_dir: ${runner.logger.log_path}/maniskill   # unused when defer_write=True
      export_format: "lerobot"      # or "pickle"
      only_success: False
      robot_type: "panda"
      fps: 10
      finalize_interval: 8
      defer_write: true   # episodes are sent via channel; actor writes to disk
  eval:
    total_num_envs: 32
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 50
    max_steps_per_rollout_epoch: 50
    use_fixed_reset_state_ids: True
    group_size: 1
    video_cfg:
      save_video: false
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1
  collect_prev_infos: False

  model:
    model_path: ""
    precision: ${actor.model.precision}

  expert_model:
    model_path: ""
    precision: ${actor.model.precision}

  enable_torch_compile: False
  enable_cuda_graph: False

actor:
  rolling_lerobot_window_size: 20000
  enable_decoded_cache: false
  decoded_cache_capacity: 20000
  cache_ingest_mode: new_shards   # or last_n / both
  cache_last_n_frames: 20000
  cache_ingest_max_frames: null   # optional int cap per refresh
  lerobot_num_workers: 0          # required for in-memory LeRobot DAgger

  enable_preload: true
  prefetch_size: 5
  min_frames: 100

  sft_data_path: ${runner.logger.log_path}/maniskill
  data_source: "lerobot"
  lerobot:
    robot_type: "panda"
    fps: 10
    finalize_interval: 8   # flush LeRobot shard every N episodes
    in_memory_mode: true   # episodes live in RAM; disk writes are persistence-only
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 6400
  global_batch_size: 6400
  seed: 42
  enable_offload: False

  model:
    model_type: "mlp_policy"
    model_path: ""
    add_value_head: True

  optim:
    lr: 3.0e-4
    value_lr: 3.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 0.5

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
